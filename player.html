<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — Player</title>
    <meta name="theme-color" content="#7c6af7">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/critical.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<canvas id="particleCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.25;"></canvas>

<div class="hero-header">
    <div class="hero-content">
        <h1 class="animated-title">
            <span class="title-word title-word-1">Study</span>
            <span class="title-word title-word-2">Flow</span>
            <span class="title-badge">AI</span>
        </h1>
        <p class="animated-subtitle">Transform any video into knowledge</p>
        <div class="hero-glow"></div>
    </div>
</div>

<div class="page-content">
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="library.html" class="nav-link">📚 Library</a>
            <a href="player.html" class="nav-link active">🎬 Player</a>
            <a href="chat.html" class="nav-link">💬 Chat</a>
            <a href="roadmap.html" class="nav-link">🗺️ Roadmap</a>
            <a href="compare.html" class="nav-link">⚖️ Compare</a>
        </div>
        <button id="darkModeToggle" class="theme-btn">☀️ Light</button>
    </nav>

    <div class="player-container">
        <!-- Left: Video + Notes -->
        <div class="video-section">
            <div class="video-wrapper">
                <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h2 id="videoTitle">Loading...</h2>
                <div class="action-row">
                    <button id="copyLinkBtn" class="small-btn">📋 Copy Link</button>
                    <button id="saveBtn" class="small-btn">💾 Save Summary</button>
                </div>
            </div>

            <!-- ===== NOTES PANEL ===== -->
            <div class="notes-panel" id="notesPanel">
                <div class="notes-header">
                    <h4>📝 My Notes</h4>
                    <button id="exportNotesBtn" class="small-btn">📎 Export Notes</button>
                </div>
                <div class="notes-input-area">
                    <textarea id="noteInput" placeholder="Jot down a quick note about this video... (Enter to save)" rows="2"></textarea>
                    <button id="addNoteBtn" title="Add Note">➕</button>
                </div>
                <div class="notes-list" id="notesList">
                    <p class="notes-empty">No notes yet. Add your first note above!</p>
                </div>
            </div>
        </div>

        <!-- Right: AI Panel -->
        <div class="ai-panel">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="summary">✨ Summary</button>
                <button class="tab-btn" data-tab="qa">💬 Q&A</button>
                <button class="tab-btn" data-tab="quiz">🎲 Quiz</button>
            </div>

            <div id="summaryTab" class="tab-content active">
                <button id="summarizeBtn" class="primary-btn">✨ Generate AI Summary</button>
                <div id="summaryOutput" class="output-area">
                    <p class="hint">Click above to generate an AI-powered summary</p>
                </div>
            </div>

            <div id="qaTab" class="tab-content">
                <div class="qa-box">
                    <input type="text" id="questionInput" placeholder="Ask anything about this video...">
                    <button id="askBtn" class="primary-btn small">Ask</button>
                </div>
                <div id="qaOutput" class="output-area">
                    <p class="hint">Ask anything about this video</p>
                </div>
            </div>

            <div id="quizTab" class="tab-content">
                <button id="quizBtn" class="primary-btn">🎲 Generate Quiz</button>
                <div id="quizOutput" class="output-area">
                    <p class="hint">Test your knowledge with AI-generated questions</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function() {
    if (localStorage.getItem('darkMode') === 'false') document.body.classList.add('light');

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const colors = ['rgba(124,106,247,','rgba(0,212,200,','rgba(247,37,133,'];
    for (let i = 0; i < 40; i++) particles.push({ x:Math.random()*1920,y:Math.random()*1080,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,color:colors[Math.floor(Math.random()*3)],alpha:Math.random()*0.4+0.1 });
    function draw() { ctx.clearRect(0,0,W,H); for(let p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+p.alpha+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;} requestAnimationFrame(draw); }
    draw();
})();
</script>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/player.js"></script>
<script src="js/notes.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Dark mode button
    const btn = document.getElementById('darkModeToggle');
    if (btn) {
        btn.textContent = document.body.classList.contains('light') ? '🌙 Dark' : '☀️ Light';
        btn.onclick = () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('darkMode', isLight ? 'false' : 'true');
            btn.textContent = isLight ? '🌙 Dark' : '☀️ Light';
        };
    }
    // Init notes
    if (typeof initNotes === 'function') initNotes();
});
</script>
</body>
</html>
