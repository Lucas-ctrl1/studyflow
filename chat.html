<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/critical.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

<canvas id="particleCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.2;"></canvas>

<div class="hero-header">
    <div class="hero-content">
        <h1 class="animated-title">
            <span class="title-word title-word-1">Study</span>
            <span class="title-word title-word-2">Flow</span>
            <span class="title-badge">AI</span>
        </h1>
        <p class="animated-subtitle">Transform any video into knowledge</p>
        <div class="hero-glow"></div>
    </div>
</div>

<div class="page-content">
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="library.html" class="nav-link">📚 Library</a>
            <a href="player.html" class="nav-link">🎬 Player</a>
            <a href="chat.html" class="nav-link active">💬 Chat</a>
            <a href="roadmap.html" class="nav-link">🗺️ Roadmap</a>
            <a href="compare.html" class="nav-link">⚖️ Compare</a>
        </div>
        <button id="darkModeToggle" class="theme-btn">☀️ Light</button>
    </nav>

    <div class="chat-container">
        <div class="chat-sidebar">
            <h3>📚 Your Videos</h3>
            <div class="video-list" id="videoList">
                <div class="empty-state">No watched videos yet</div>
            </div>
            <div class="sidebar-footer">
                <button id="clearChatBtn" class="secondary-btn">🗑️ Clear Chat</button>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="selected-video" id="selectedVideo">
                    <span>🎬</span>
                    <span id="selectedVideoTitle">Select a video to start chatting</span>
                </div>
                <button id="exportChatBtn" class="small-btn">📎 Export</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <div class="ai-avatar">🤖</div>
                    <div class="message-bubble">
                        <p>Hi! I'm your AI study assistant. Select a video from the sidebar and ask me anything about it!</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea id="chatInput" placeholder="Ask anything about the video..." rows="2"></textarea>
                <button id="sendBtn" class="primary-btn small">Send 📤</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function() {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const colors = ['rgba(124,106,247,','rgba(0,212,200,','rgba(247,37,133,'];
    for (let i = 0; i < 35; i++) particles.push({ x:Math.random()*1920, y:Math.random()*1080, r:Math.random()*1.5+0.3, vx:(Math.random()-0.5)*0.18, vy:(Math.random()-0.5)*0.18, color:colors[Math.floor(Math.random()*3)], alpha:Math.random()*0.35+0.1 });
    function draw() { ctx.clearRect(0,0,W,H); for(let p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+p.alpha+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;} requestAnimationFrame(draw); }
    draw();
    const btn = document.getElementById('darkModeToggle');
    if (localStorage.getItem('darkMode') === 'false') { document.body.classList.add('light'); btn.textContent = '🌙 Dark'; }
    else { btn.textContent = '☀️ Light'; }
    btn.onclick = () => { document.body.classList.toggle('light'); const isLight = document.body.classList.contains('light'); localStorage.setItem('darkMode', isLight ? 'false' : 'true'); btn.textContent = isLight ? '🌙 Dark' : '☀️ Light'; };
})();
</script>

<script src="js/config.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
